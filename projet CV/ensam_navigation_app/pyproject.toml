[tool.ruff]
line-length = 100
target-version = "py310"
exclude = [
    "__pycache__",
    ".venv",
    "data/raw",
    "data/train",
    "data/val",
    "data/gallery",
    "outputs",
    "checkpoints",
]

[tool.ruff.lint]
select = ["E", "F", "I", "B"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-q"
